<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast Food Master - Recipe Bug Fixed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            font-family: 'Fredoka', sans-serif;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0f172a;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; touch-action: none;
        }

        #game-container {
            position: relative;
            width: 1024px; height: 768px;
            background: #1e293b;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; outline: none; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; transition: opacity 0.3s ease;
        }

        .hidden { display: none !important; opacity: 0; pointer-events: none; }

        h1 {
            color: #fde047; font-size: 4.5rem; margin: 0 0 5px 0;
            text-shadow: 0 5px 15px rgba(253, 224, 71, 0.4); text-align: center;
        }
        h2 { color: #cbd5e1; font-size: 1.5rem; margin: 0 0 30px 0; font-weight: 400; text-align: center; letter-spacing: 2px;}

        /* Menu Grid for Modes */
        .mode-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .btn {
            background: #3b82f6; color: white; border: none; padding: 15px 20px;
            font-size: 1.5rem; font-family: inherit; font-weight: 700;
            border-radius: 15px; cursor: pointer;
            box-shadow: 0 8px 0 #1d4ed8, 0 15px 20px rgba(0,0,0,0.4);
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }
        
        .btn span { font-size: 1rem; font-weight: 400; opacity: 0.8; margin-top: 5px; }

        .btn-relax { background: #10b981; box-shadow: 0 8px 0 #047857; }
        .btn-sandbox { background: #8b5cf6; box-shadow: 0 8px 0 #6d28d9; }
        .btn-normal { background: #f59e0b; box-shadow: 0 8px 0 #b45309; }
        .btn-expert { background: #ef4444; box-shadow: 0 8px 0 #b91c1c; }
        .btn-express { background: #ec4899; box-shadow: 0 8px 0 #be185d; }
        .btn-challenge { background: #06b6d4; box-shadow: 0 8px 0 #0369a1; }

        #eval-score { font-size: 4.5rem; color: #10b981; font-weight: 700; margin: 10px 0; text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);}
        #eval-breakdown { font-size: 1.4rem; color: #94a3b8; margin-bottom: 30px; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1024" height="768"></canvas>

    <div id="main-menu" class="overlay">
        <h1>FAST FOOD MASTER</h1>
        <h2>SELECT YOUR SHIFT</h2>
        
        <div class="mode-grid">
            <button class="btn btn-relax" onclick="startGame('RELAX')">🌿 RELAX <span>No time pressure</span></button>
            <button class="btn btn-normal" onclick="startGame('NORMAL')">🔥 NORMAL <span>Standard shift</span></button>
            <button class="btn btn-expert" onclick="startGame('EXPERT')">💀 EXPERT <span>Fast & furious</span></button>
            <button class="btn btn-express" onclick="startGame('EXPRESS')">⚡ EXPRESS <span>Lightning speed</span></button>
            <button class="btn btn-challenge" onclick="startGame('CHALLENGES')">🎯 CHALLENGE <span>High stakes</span></button>
            <button class="btn btn-sandbox" onclick="startGame('SANDBOX')">🎨 SANDBOX <span>Free play / No rules</span></button>
        </div>
    </div>

    <div id="eval-screen" class="overlay hidden">
        <h1 id="eval-title">ORDER COMPLETE</h1>
        <div id="eval-score">100%</div>
        <div id="eval-breakdown" id="eval-breakdown">Pizza: 100% | Drink: 100% | Side: 100%</div>
        <div style="display:flex; gap:20px;">
            <button class="btn btn-relax" style="padding: 15px 40px;" onclick="nextOrder()">NEXT ORDER</button>
            <button class="btn" style="background:#64748b; box-shadow: 0 8px 0 #334155; padding: 15px 40px;" onclick="returnToMenu()">MENU</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- SYSTEM STATE & DATA ---
    const GAME_W = 1024; const GAME_H = 768;
    
    const MODES = {
        RELAX: { name: "RELAX MODE", drainRate: 0, cookSpeed: 1, sandbox: false },
        NORMAL: { name: "NORMAL MODE", drainRate: 2, cookSpeed: 1, sandbox: false },
        EXPERT: { name: "EXPERT MODE", drainRate: 4, cookSpeed: 1.5, sandbox: false },
        EXPRESS: { name: "EXPRESS MODE", drainRate: 6, cookSpeed: 2, sandbox: false },
        CHALLENGES: { name: "CHALLENGE", drainRate: 3, cookSpeed: 1.2, sandbox: false },
        SANDBOX: { name: "SANDBOX", drainRate: 0, cookSpeed: 1, sandbox: true }
    };

    let game = { isPlaying: false, score: 0, combo: 1, lastTime: 0, currentMode: null };

    const PIZZA_RECIPES = [
        { name: "Cheese", req: ['CHEESE'] },
        { name: "Pepperoni", req: ['CHEESE', 'MEAT'] },
        { name: "Veggie", req: ['CHEESE', 'VEGGIE'] },
        { name: "Supreme", req: ['CHEESE', 'MEAT', 'VEGGIE'] }
    ];
    const DRINKS = ['COLA', 'JUICE', 'SHAKE'];
    const SIDES = ['FRIES', 'NUGGETS', 'HOTDOG'];

    let order = { active: false, pizza: { name: "", req: [] }, drink: "", side: "", patience: 100, maxPatience: 100 };

    let pizza = { active: false, isBaking: false, isBaked: false, radius: 0, targetRadius: 160, sauceRadius: 0, bakeProgress: 0, toppings: [] };
    let drink = { active: false, type: null, fillLevel: 0, spilled: false };
    
    // SIDE STATION
    let side = { active: false, type: null, cookProgress: 0, isBurnt: false, isReady: false };
    let sidePlate = { active: false, type: null }; 

    let pointer = { x: 0, y: 0, isDown: false, heldId: null };
    let particles = []; let floatingTexts = []; let screenFlash = 0;

    // --- UI ZONES & BUTTONS ---
    const ZONES = {
        order: { x: 20, y: 70, w: 240, h: 360 },
        pizzaCenter: { x: 480, y: 280 },
        drink: { x: 20, y: 460, w: 300, h: 280 },
        side: { x: 340, y: 460, w: 380, h: 280 }
    };

    const BUTTONS = [
        // Pizza Prep
        { id: 'P_DOUGH', x: 750, y: 70, w: 120, h: 60, color: '#f59e0b', text: 'DOUGH', icon: '🍞' },
        { id: 'P_SAUCE', x: 880, y: 70, w: 120, h: 60, color: '#ef4444', text: 'SAUCE', icon: '🍅', holdable: true },
        { id: 'P_CHEESE', x: 750, y: 150, w: 120, h: 60, color: '#eab308', text: 'CHEESE', icon: '🧀' },
        { id: 'P_MEAT', x: 880, y: 150, w: 120, h: 60, color: '#b91c1c', text: 'MEAT', icon: '🥩' },
        { id: 'P_VEGGIE', x: 750, y: 230, w: 120, h: 60, color: '#22c55e', text: 'VEGGIE', icon: '🫑' },
        { id: 'P_TRASH', x: 880, y: 230, w: 120, h: 60, color: '#64748b', text: 'TRASH', icon: '🗑️' },
        { id: 'P_OVEN', x: 750, y: 320, w: 250, h: 80, color: '#3b82f6', text: 'TO OVEN', icon: '🔥' },
        { id: 'SERVE_ALL', x: 750, y: 560, w: 250, h: 120, color: '#10b981', text: 'SERVE ALL', icon: '🛎️' },
        
        // Drink
        { id: 'D_COLA', x: 40, y: 640, w: 70, h: 50, color: '#475569', text: 'COLA', holdable: true },
        { id: 'D_JUICE', x: 130, y: 640, w: 70, h: 50, color: '#f97316', text: 'JUICE', holdable: true },
        { id: 'D_SHAKE', x: 220, y: 640, w: 70, h: 50, color: '#ec4899', text: 'SHAKE', holdable: true },
        { id: 'D_TRASH', x: 260, y: 500, w: 40, h: 40, color: '#ef4444', text: '🗑️' },

        // Side Grill Buttons
        { id: 'S_FRIES', x: 350, y: 660, w: 90, h: 60, color: '#facc15', text: 'FRIES', icon: '🍟' },
        { id: 'S_NUGGETS', x: 450, y: 660, w: 90, h: 60, color: '#d97706', text: 'NUGGETS', icon: '🍗' },
        { id: 'S_HOTDOG', x: 550, y: 660, w: 90, h: 60, color: '#b91c1c', text: 'HOTDOG', icon: '🌭' },
        { id: 'S_TRASH', x: 660, y: 500, w: 40, h: 40, color: '#ef4444', text: '🗑️' }
    ];

    const COLORS = {
        doughRaw: '#fde68a', doughBaked: '#d97706', doughBurnt: '#451a03',
        crustRaw: '#fcd34d', crustBaked: '#b45309', crustBurnt: '#290f02',
        sauceRaw: '#dc2626', sauceBaked: '#991b1b', sauceBurnt: '#450a0a',
        COLA: '#292524', JUICE: '#f97316', SHAKE: '#fbcfe8'
    };

    // --- CORE LOGIC ---
    function startGame(modeKey) {
        game.currentMode = MODES[modeKey];
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('eval-screen').classList.add('hidden');
        game.isPlaying = true; game.score = 0; game.combo = 1;
        game.lastTime = performance.now();
        particles = []; floatingTexts = [];
        generateOrder();
        resetAllStations();
        requestAnimationFrame(gameLoop);
    }

    function returnToMenu() {
        game.isPlaying = false;
        document.getElementById('eval-screen').classList.add('hidden');
        document.getElementById('main-menu').classList.remove('hidden');
    }

    function generateOrder() {
        if (game.currentMode.sandbox) { order.active = false; return; }
        let pRecipe = PIZZA_RECIPES[Math.floor(Math.random() * PIZZA_RECIPES.length)];
        order.pizza.name = pRecipe.name; order.pizza.req = [...pRecipe.req];
        order.drink = DRINKS[Math.floor(Math.random() * DRINKS.length)];
        order.side = SIDES[Math.floor(Math.random() * SIDES.length)];
        order.patience = 100; order.active = true;
    }

    function nextOrder() {
        document.getElementById('eval-screen').classList.add('hidden');
        game.isPlaying = true; 
        generateOrder();
        resetAllStations();
        game.lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    }

    function resetAllStations() {
        pizza = { active: false, isBaking: false, isBaked: false, radius: 0, targetRadius: 160, sauceRadius: 0, bakeProgress: 0, toppings: [] };
        drink = { active: false, type: null, fillLevel: 0, spilled: false };
        side = { active: false, type: null, cookProgress: 0, isBurnt: false, isReady: false };
        sidePlate = { active: false, type: null }; 
        updateDynamicButtons();
    }

    function spawnParticle(x, y, color, speed = 15, size = 8) {
        particles.push({ x, y, vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed, life: 1, color, size: Math.random()*size+2 });
    }
    function spawnText(text, x, y, color) { floatingTexts.push({ text, x, y, life: 1, color }); }

    function updateDynamicButtons() {
        let btn = BUTTONS.find(b => b.id === 'P_OVEN');
        if (!pizza.active) { btn.text = 'OVEN'; btn.color = '#64748b'; btn.icon = '🔥'; }
        else if (!pizza.isBaking && !pizza.isBaked) { btn.text = 'BAKE'; btn.color = '#3b82f6'; btn.icon = '🔥'; }
        else if (pizza.isBaking) { btn.text = 'TAKE OUT'; btn.color = '#ef4444'; btn.icon = '🛑'; }
        else if (pizza.isBaked) { btn.text = 'READY'; btn.color = '#10b981'; btn.icon = '✔️'; }

        let srvBtn = BUTTONS.find(b => b.id === 'SERVE_ALL');
        if (game.currentMode && game.currentMode.sandbox) {
            srvBtn.text = 'TRASH ALL'; srvBtn.color = '#ef4444'; srvBtn.icon = '🗑️';
        } else {
            srvBtn.text = 'SERVE ALL'; srvBtn.color = '#10b981'; srvBtn.icon = '🛎️';
        }
    }

    // --- INPUT HANDLING ---
    function getPointerPos(e) {
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const rect = canvas.getBoundingClientRect();
        pointer.x = (clientX - rect.left) * (canvas.width / rect.width);
        pointer.y = (clientY - rect.top) * (canvas.height / rect.height);
    }

    function handleDown(e) {
        if(!game.isPlaying) return;
        getPointerPos(e); pointer.isDown = true;
        
        let clickedButton = false;

        BUTTONS.forEach(btn => {
            if (pointer.x >= btn.x && pointer.x <= btn.x + btn.w && pointer.y >= btn.y && pointer.y <= btn.y + btn.h) {
                if(btn.holdable) pointer.heldId = btn.id;
                else executeAction(btn.id);
                for(let i=0;i<3;i++) spawnParticle(btn.x+btn.w/2, btn.y+btn.h/2, '#fff', 5, 4);
                clickedButton = true;
            }
        });

        // Hitbox Grill untuk Plating
        let gx = ZONES.side.x + 20; let gy = ZONES.side.y + 60;
        let gw = 150; let gh = 100;
        if (!clickedButton && pointer.x >= gx && pointer.x <= gx + gw && pointer.y >= gy && pointer.y <= gy + gh) {
            if (side.active && side.isReady && !side.isBurnt) {
                if (!sidePlate.active) {
                    executeAction('PLATE_SIDE');
                    for(let i=0;i<5;i++) spawnParticle(gx+gw/2, gy+gh/2, '#10b981', 8, 5);
                } else {
                    spawnText("PLATE FULL!", gx+gw/2, gy-10, '#ef4444');
                }
            }
        }
    }

    function handleUp() { pointer.isDown = false; pointer.heldId = null; }

    canvas.addEventListener('mousedown', handleDown);
    canvas.addEventListener('touchstart', (e)=>{e.preventDefault(); handleDown(e);}, {passive:false});
    window.addEventListener('mouseup', handleUp);
    window.addEventListener('touchend', handleUp);
    canvas.addEventListener('mousemove', getPointerPos);
    canvas.addEventListener('touchmove', (e)=>{e.preventDefault(); getPointerPos(e);}, {passive:false});

    function executeAction(id) {
        // --- PIZZA ---
        if(id === 'P_DOUGH' && !pizza.active) {
            pizza.active = true; pizza.targetRadius = 160;
            for(let i=0;i<10;i++) spawnParticle(ZONES.pizzaCenter.x, ZONES.pizzaCenter.y, '#fde68a');
        }
        else if(id === 'P_TRASH') { pizza.active = false; pizza.toppings = []; pizza.sauceRadius = 0; pizza.bakeProgress=0; pizza.isBaked=false; pizza.isBaking=false; }
        else if(['P_CHEESE', 'P_MEAT', 'P_VEGGIE'].includes(id) && pizza.active && !pizza.isBaking && !pizza.isBaked) {
            let type = id.split('_')[1]; let count = type === 'CHEESE' ? 6 : 3;
            for(let i=0; i<count; i++) {
                let a = Math.random() * Math.PI*2; let r = Math.random()*(pizza.targetRadius*0.7);
                pizza.toppings.push({ type, x: Math.cos(a)*r, y: Math.sin(a)*r, rot: Math.random()*Math.PI*2 });
            }
        }
        else if(id === 'P_OVEN' && pizza.active) {
            if(!pizza.isBaking && !pizza.isBaked) { pizza.isBaking = true; spawnText("BAKING", ZONES.pizzaCenter.x, ZONES.pizzaCenter.y, '#f59e0b'); }
            else if(pizza.isBaking) { pizza.isBaking = false; pizza.isBaked = true; spawnParticle(ZONES.pizzaCenter.x, ZONES.pizzaCenter.y, '#10b981', 20); }
        }
        
        // --- DRINK ---
        else if(id === 'D_TRASH') { drink.active = false; drink.fillLevel = 0; drink.spilled = false; }
        
        // --- SIDE STATION ---
        else if(id.startsWith('S_') && id !== 'S_TRASH') {
            let type = id.split('_')[1];
            
            if(!side.active) { 
                side.active = true; side.type = type; side.cookProgress = 0; side.isBurnt = false; side.isReady = false; 
            }
            else if (side.active && side.type === type && side.isReady && !side.isBurnt) {
                if (!sidePlate.active) { executeAction('PLATE_SIDE'); }
                else { spawnText("PLATE FULL!", ZONES.side.x+95, ZONES.side.y+50, '#ef4444'); }
            }
        }
        else if(id === 'PLATE_SIDE') {
            sidePlate.active = true;
            sidePlate.type = side.type;
            side.active = false; 
            spawnText("PLATED!", ZONES.side.x+270, ZONES.side.y+100, '#3b82f6');
        }
        else if(id === 'S_TRASH') { 
            side.active = false; side.cookProgress = 0; 
            sidePlate.active = false; sidePlate.type = null; 
        }
        
        // --- SERVE ---
        else if(id === 'SERVE_ALL') { 
            if (game.currentMode.sandbox) {
                resetAllStations(); spawnText("CLEARED!", ZONES.pizzaCenter.x, ZONES.pizzaCenter.y, '#10b981'); screenFlash = 0.5;
            } else {
                evaluateOrder(); 
            }
        }
        updateDynamicButtons();
    }

    // --- EVALUATION ENGINE (BUG FIX PIZZA) ---
    function evaluateOrder() {
        game.isPlaying = false;
        let pScore = 0, dScore = 0, sScore = 0;
        let pMsg = "", dMsg = "", sMsg = "";

        // 1. Evaluate Pizza
        if (!pizza.isBaked) { pScore = 0; pMsg = "Raw/Missing!"; }
        else if (pizza.bakeProgress > 1.3) { pScore = 20; pMsg = "Burnt!"; }
        else {
            let tScore = 100; 
            let req = [...order.pizza.req]; 
            // BUG FIX: Gunakan Set() untuk ambil tipe topping yang ada di pizza, abaikan duplikat partikel visual
            let onPizza = [...new Set(pizza.toppings.map(t => t.type))]; 
            
            req.forEach(r => {
                let idx = onPizza.indexOf(r);
                if(idx > -1) { onPizza.splice(idx, 1); } else { tScore -= 30; } // Missing
            });
            
            // Kalau masih ada sisa di onPizza, berarti itu topping yang salah/nggak sesuai pesanan
            if(onPizza.length > 0) tScore -= onPizza.length * 20; 
            if(pizza.sauceRadius < 100) tScore -= 30; // Nggak pake saos
            
            pScore = Math.max(0, tScore);
            pMsg = pScore >= 80 ? "Perfect!" : (pScore > 0 ? "Okay" : "Wrong Recipe");
        }

        // 2. Evaluate Drink
        if (!drink.active) { dScore = 0; dMsg = "Missing!"; }
        else if (drink.type !== order.drink) { dScore = 0; dMsg = "Wrong Drink!"; }
        else if (drink.spilled) { dScore = 30; dMsg = "Spilled!"; }
        else if (drink.fillLevel < 0.7) { dScore = 50; dMsg = "Half Empty!"; }
        else { dScore = 100; dMsg = "Perfect!"; }

        // 3. Evaluate Side
        if (sidePlate.active) {
            if (sidePlate.type !== order.side) { sScore = 0; sMsg = "Wrong Side!"; }
            else { sScore = 100; sMsg = "Perfect!"; }
        } else {
            if (!side.active) { sScore = 0; sMsg = "Missing!"; }
            else if (side.type !== order.side) { sScore = 0; sMsg = "Wrong Side!"; }
            else if (side.isBurnt) { sScore = 20; sMsg = "Burnt!"; }
            else if (!side.isReady) { sScore = 40; sMsg = "Raw!"; }
            else { sScore = 80; sMsg = "Left on Grill!"; }
        }

        let totalScore = Math.round((pScore + dScore + sScore) / 3);
        if (order.patience <= 0) { totalScore = Math.max(0, totalScore - 50); pMsg = "Too Slow!"; }

        if (totalScore >= 80) { game.combo++; game.score += totalScore * game.combo; screenFlash = 1.0; }
        else { game.combo = 1; game.score += totalScore; }

        document.getElementById('eval-title').innerText = totalScore >= 80 ? "AWESOME!" : "COULD BE BETTER";
        document.getElementById('eval-score').innerText = `${totalScore}%`;
        document.getElementById('eval-score').style.color = totalScore >= 80 ? '#10b981' : (totalScore > 40 ? '#f59e0b' : '#ef4444');
        document.getElementById('eval-breakdown').innerHTML = `Pizza: ${pScore}% (${pMsg})<br>Drink: ${dScore}% (${dMsg})<br>Side: ${sScore}% (${sMsg})`;
        
        document.getElementById('eval-screen').classList.remove('hidden');
    }

    // --- UPDATE LOOP ---
    function update(dt) {
        let speedMod = game.currentMode ? game.currentMode.cookSpeed : 1;

        if (order.active && game.currentMode.drainRate > 0) {
            order.patience -= dt * game.currentMode.drainRate;
            if (order.patience <= 0) evaluateOrder();
        }

        if (pointer.isDown && pointer.heldId) {
            if(pointer.heldId === 'P_SAUCE' && pizza.active && !pizza.isBaking && !pizza.isBaked) {
                pizza.sauceRadius = Math.min(pizza.targetRadius * 0.85, pizza.sauceRadius + dt * 100);
                if(Math.random()<0.2) spawnParticle(ZONES.pizzaCenter.x+(Math.random()-0.5)*100, ZONES.pizzaCenter.y+(Math.random()-0.5)*100, '#dc2626', 5);
            }
            else if (pointer.heldId.startsWith('D_')) {
                let type = pointer.heldId.split('_')[1];
                if (!drink.active || drink.type !== type) { drink.active = true; drink.type = type; drink.fillLevel = 0; drink.spilled = false; }
                if (drink.active && !drink.spilled) {
                    drink.fillLevel += dt * 0.5 * speedMod;
                    spawnParticle(170, 560 - drink.fillLevel*80, COLORS[type], 10, 5);
                    if (drink.fillLevel > 1.2) { drink.spilled = true; spawnText("SPILLED!", 170, 480, '#ef4444'); }
                }
            }
        }

        if (pizza.active) {
            pizza.radius += (pizza.targetRadius - pizza.radius) * dt * 10;
            if(pizza.isBaking) {
                pizza.bakeProgress += dt * 0.15 * speedMod;
                if(pizza.bakeProgress > 1 && pizza.bakeProgress < 1.05) spawnText("PERFECT", ZONES.pizzaCenter.x, ZONES.pizzaCenter.y-100, '#10b981');
                if(pizza.bakeProgress > 1.4 && pizza.bakeProgress < 1.45) spawnText("BURNT", ZONES.pizzaCenter.x, ZONES.pizzaCenter.y-100, '#ef4444');
            }
        }

        if (side.active) {
            side.cookProgress += dt * 0.2 * speedMod;
            if(side.cookProgress >= 0.8 && !side.isReady && !side.isBurnt) { side.isReady = true; spawnParticle(ZONES.side.x+80, ZONES.side.y+100, '#10b981', 15); }
            if(side.cookProgress > 1.3 && !side.isBurnt) { side.isBurnt = true; side.isReady = false; spawnText("BURNT!", ZONES.side.x+80, ZONES.side.y+80, '#ef4444'); }
            if(side.active && !side.isBurnt && Math.random()<0.05) spawnParticle(ZONES.side.x+80+(Math.random()-0.5)*30, ZONES.side.y+100, '#cbd5e1', 5, 3);
        }

        particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= dt; }); particles = particles.filter(p => p.life > 0);
        floatingTexts.forEach(ft => { ft.y -= dt * 40; ft.life -= dt; }); floatingTexts = floatingTexts.filter(ft => ft.life > 0);
        if (screenFlash > 0) screenFlash = Math.max(0, screenFlash - dt * 2);
    }

    // --- DRAW UTILS & LOOP ---
    function drawRoundedRect(x, y, w, h, r, color, shadow=true) {
        ctx.fillStyle = color;
        if(shadow) { ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 5; }
        ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
        ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    }

    function lerpColor(c1, c2, t) {
        t = Math.max(0, Math.min(1, t));
        const hex = (c) => parseInt(c.slice(1), 16);
        const r1 = hex(c1) >> 16, g1 = (hex(c1) >> 8) & 0xff, b1 = hex(c1) & 0xff;
        const r2 = hex(c2) >> 16, g2 = (hex(c2) >> 8) & 0xff, b2 = hex(c2) & 0xff;
        const r = Math.round(r1 + (r2 - r1) * t), g = Math.round(g1 + (g2 - g1) * t), b = Math.round(b1 + (b2 - b1) * t);
        return `#${(1<<24 | r<<16 | g<<8 | b).toString(16).slice(1).padStart(6,'0')}`;
    }

    function draw() {
        ctx.clearRect(0, 0, GAME_W, GAME_H);

        // --- ZONES BACKGROUNDS ---
        drawRoundedRect(ZONES.order.x, ZONES.order.y, ZONES.order.w, ZONES.order.h, 15, '#334155');
        if(pizza.isBaking) {
            let glow = Math.abs(Math.sin(performance.now()/200)) * 0.2 + 0.3;
            let grad = ctx.createRadialGradient(ZONES.pizzaCenter.x, ZONES.pizzaCenter.y, 50, ZONES.pizzaCenter.x, ZONES.pizzaCenter.y, 400);
            grad.addColorStop(0, `rgba(239,68,68,${glow})`); grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad; ctx.fillRect(0,0,GAME_W,GAME_H);
        }
        drawRoundedRect(ZONES.drink.x, ZONES.drink.y, ZONES.drink.w, ZONES.drink.h, 15, '#0f172a');
        drawRoundedRect(ZONES.side.x, ZONES.side.y, ZONES.side.w, ZONES.side.h, 15, '#1e293b');

        // --- TOP BAR ---
        ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, GAME_W, 50);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 24px Fredoka'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(`SCORE: ${game.score}`, 20, 25);
        ctx.fillStyle = game.combo > 1 ? '#f59e0b' : '#94a3b8'; ctx.fillText(`COMBO x${game.combo}`, 200, 25);
        ctx.fillStyle = '#94a3b8'; ctx.textAlign = 'right'; ctx.fillText(game.currentMode ? game.currentMode.name : "", GAME_W-20, 25);

        // --- ORDER PANEL ---
        if (order.active) {
            ctx.fillStyle = '#fde047'; ctx.textAlign = 'center'; ctx.font = 'bold 22px Fredoka';
            ctx.fillText("CURRENT ORDER", ZONES.order.x + 120, ZONES.order.y + 30);
            if (game.currentMode.drainRate > 0) {
                drawRoundedRect(ZONES.order.x+20, ZONES.order.y+50, 200, 10, 5, '#0f172a', false);
                let pColor = order.patience > 50 ? '#10b981' : (order.patience > 20 ? '#f59e0b' : '#ef4444');
                drawRoundedRect(ZONES.order.x+20, ZONES.order.y+50, Math.max(0, (order.patience/order.maxPatience)*200), 10, 5, pColor, false);
            } else {
                ctx.fillStyle = '#10b981'; ctx.font = '16px Fredoka'; ctx.fillText("NO TIME LIMIT", ZONES.order.x + 120, ZONES.order.y + 60);
            }
            ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.font = '20px Fredoka';
            let oy = ZONES.order.y + 100;
            ctx.fillText(`🍕 ${order.pizza.name} Pizza`, ZONES.order.x+20, oy);
            let pIcons = order.pizza.req.map(r=> r==='CHEESE'?'🧀':(r==='MEAT'?'🥩':'🫑')).join(' ');
            ctx.font = '24px Arial'; ctx.fillText(pIcons, ZONES.order.x+50, oy+30);
            ctx.font = '20px Fredoka';
            let dIcon = order.drink === 'COLA' ? '🥤' : (order.drink === 'JUICE' ? '🧃' : '🥛');
            ctx.fillText(`${dIcon} ${order.drink}`, ZONES.order.x+20, oy+80);
            let sIcon = order.side === 'FRIES' ? '🍟' : (order.side === 'NUGGETS' ? '🍗' : '🌭');
            ctx.fillText(`${sIcon} ${order.side}`, ZONES.order.x+20, oy+130);
        } else if (game.currentMode && game.currentMode.sandbox) {
            ctx.fillStyle = '#fde047'; ctx.textAlign = 'center'; ctx.font = 'bold 22px Fredoka';
            ctx.fillText("SANDBOX", ZONES.order.x + 120, ZONES.order.y + 150);
            ctx.fillStyle = '#fff'; ctx.font = '18px Fredoka'; ctx.fillText("Experiment Freely!", ZONES.order.x + 120, ZONES.order.y + 180);
        }

        // --- PIZZA ---
        if (pizza.active) {
            let px = ZONES.pizzaCenter.x; let py = ZONES.pizzaCenter.y;
            let cCol = pizza.bakeProgress<1 ? lerpColor(COLORS.crustRaw, COLORS.crustBaked, pizza.bakeProgress) : lerpColor(COLORS.crustBaked, COLORS.crustBurnt, pizza.bakeProgress-1);
            let dCol = pizza.bakeProgress<1 ? lerpColor(COLORS.doughRaw, COLORS.doughBaked, pizza.bakeProgress) : lerpColor(COLORS.doughBaked, COLORS.doughBurnt, pizza.bakeProgress-1);
            let sCol = pizza.bakeProgress<1 ? lerpColor(COLORS.sauceRaw, COLORS.sauceBaked, pizza.bakeProgress) : lerpColor(COLORS.sauceBaked, COLORS.sauceBurnt, pizza.bakeProgress-1);

            ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 20; ctx.beginPath(); ctx.arc(px, py, pizza.radius, 0, Math.PI*2); ctx.fillStyle = cCol; ctx.fill();
            ctx.shadowBlur = 0; ctx.beginPath(); ctx.arc(px, py, pizza.radius*0.9, 0, Math.PI*2); ctx.fillStyle = dCol; ctx.fill();
            if (pizza.sauceRadius > 0) { ctx.beginPath(); ctx.arc(px, py, pizza.sauceRadius, 0, Math.PI*2); ctx.fillStyle = sCol; ctx.fill(); }

            pizza.toppings.forEach(t => {
                ctx.save(); ctx.translate(px+t.x, py+t.y); ctx.rotate(t.rot);
                if (t.type === 'CHEESE') {
                    let s = pizza.bakeProgress > 0.5 ? 1.5 : 1; ctx.scale(s,s);
                    ctx.fillStyle = pizza.bakeProgress < 1.2 ? lerpColor('#fde047', '#eab308', Math.min(1, pizza.bakeProgress)) : '#854d0e';
                    ctx.beginPath(); ctx.ellipse(0,0,15,10,0,0,Math.PI*2); ctx.fill();
                } else {
                    ctx.font = '35px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
                    if(pizza.bakeProgress > 1.2) ctx.filter = 'brightness(40%)';
                    ctx.fillText(t.type==='MEAT'?'🥩':'🫑', 0, 0); ctx.filter = 'none';
                }
                ctx.restore();
            });

            if (pizza.isBaking) {
                drawRoundedRect(px-100, py+pizza.radius+20, 200, 15, 7, '#334155', false);
                let pCol = pizza.bakeProgress>1.3 ? '#ef4444' : (pizza.bakeProgress>0.8 ? '#10b981' : '#f59e0b');
                drawRoundedRect(px-100, py+pizza.radius+20, Math.min(200, pizza.bakeProgress*150), 15, 7, pCol, false);
            }
        }

        // --- DRINK STATION ---
        ctx.fillStyle = '#cbd5e1'; ctx.font = 'bold 20px Fredoka'; ctx.textAlign='center'; ctx.fillText("DRINKS", ZONES.drink.x + ZONES.drink.w/2, ZONES.drink.y+30);
        let cx = 170; let cy = 570;
        if (drink.active) {
            if (drink.spilled) { ctx.fillStyle = COLORS[drink.type]; ctx.beginPath(); ctx.ellipse(cx, cy+40, 60, 20, 0, 0, Math.PI*2); ctx.fill(); }
            let fillH = Math.min(1.1, drink.fillLevel) * 80;
            ctx.fillStyle = COLORS[drink.type]; ctx.fillRect(cx-30, cy - fillH + 40, 60, fillH);
            ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 5; ctx.beginPath();
            ctx.moveTo(cx-30, cy-40); ctx.lineTo(cx-30, cy+40); ctx.lineTo(cx+30, cy+40); ctx.lineTo(cx+30, cy-40); ctx.stroke();
            let stat = drink.spilled ? "SPILLED" : (drink.fillLevel>=1 ? "FULL" : "FILLING...");
            ctx.fillStyle = drink.spilled ? '#ef4444' : (drink.fillLevel>=1 ? '#10b981' : '#f59e0b');
            ctx.font = 'bold 16px Fredoka'; ctx.fillText(stat, cx, cy+65);
        } else {
            ctx.fillStyle = '#334155'; ctx.fillRect(cx-30, cy-40, 60, 80); ctx.fillStyle='#94a3b8'; ctx.font='16px Fredoka'; ctx.fillText("EMPTY", cx, cy);
        }
        [40, 130, 220].forEach((nx, i) => {
            ctx.fillStyle = '#475569'; ctx.fillRect(nx+15, 600, 10, 30);
            if(pointer.isDown && pointer.heldId === `D_${DRINKS[i]}`) { ctx.fillStyle = COLORS[DRINKS[i]]; ctx.fillRect(nx+17, 630, 6, 20); }
        });

        // --- SIDE STATION (PENGGORENGAN & PIRING) ---
        ctx.fillStyle = '#cbd5e1'; ctx.font = 'bold 20px Fredoka'; ctx.textAlign='center'; ctx.fillText("GRILL & PLATE", ZONES.side.x + ZONES.side.w/2, ZONES.side.y+30);
        
        // Kotak Penggorengan
        if (side.active && side.isReady && !side.isBurnt) {
            let alpha = Math.abs(Math.sin(performance.now() / 150)) * 0.4;
            ctx.fillStyle = `rgba(16, 185, 129, ${alpha})`;
            ctx.beginPath(); ctx.roundRect(ZONES.side.x+20, ZONES.side.y+60, 150, 100, 10); ctx.fill();
            ctx.fillStyle = '#10b981'; ctx.font = 'bold 16px Fredoka';
            ctx.fillText("TAP TO PLATE!", ZONES.side.x+95, ZONES.side.y+45);
        } else {
            drawRoundedRect(ZONES.side.x+20, ZONES.side.y+60, 150, 100, 10, '#0f172a', false);
        }

        if (side.active) {
            ctx.font = '50px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
            let icon = side.type === 'FRIES' ? '🍟' : (side.type === 'NUGGETS' ? '🍗' : '🌭');
            let bnc = (side.cookProgress > 0 && !side.isReady && !side.isBurnt) ? Math.sin(performance.now()/50)*5 : 0;
            if(side.isBurnt) ctx.filter = 'brightness(30%)';
            ctx.fillText(icon, ZONES.side.x+95, ZONES.side.y+100 + bnc);
            ctx.filter = 'none';

            drawRoundedRect(ZONES.side.x+30, ZONES.side.y+170, 130, 10, 5, '#334155', false);
            let sCol = side.isBurnt ? '#ef4444' : (side.isReady ? '#10b981' : '#f59e0b');
            drawRoundedRect(ZONES.side.x+30, ZONES.side.y+170, Math.min(130, side.cookProgress*130), 10, 5, sCol, false);
            
            ctx.fillStyle = sCol; ctx.font = 'bold 14px Fredoka';
            ctx.fillText(side.isBurnt ? "BURNT!" : (side.isReady ? "READY!" : "COOKING..."), ZONES.side.x+95, ZONES.side.y+195);
        }

        // Piring Saji
        drawRoundedRect(ZONES.side.x+190, ZONES.side.y+60, 160, 100, 50, '#94a3b8', true);
        drawRoundedRect(ZONES.side.x+200, ZONES.side.y+70, 140, 80, 40, '#f1f5f9', false);
        if (sidePlate.active) {
            ctx.font = '60px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
            let pIcon = sidePlate.type === 'FRIES' ? '🍟' : (sidePlate.type === 'NUGGETS' ? '🍗' : '🌭');
            ctx.fillText(pIcon, ZONES.side.x+270, ZONES.side.y+115);
        } else {
            ctx.fillStyle = '#cbd5e1'; ctx.font = 'bold 16px Fredoka'; ctx.fillText("EMPTY PLATE", ZONES.side.x+270, ZONES.side.y+115);
        }

        // --- BUTTONS ---
        BUTTONS.forEach(btn => {
            let isPressed = pointer.isDown && pointer.x > btn.x && pointer.x < btn.x+btn.w && pointer.y > btn.y && pointer.y < btn.y+btn.h;
            let oy = isPressed ? 5 : 0;
            
            drawRoundedRect(btn.x, btn.y+oy, btn.w, btn.h, 10, btn.color, !isPressed);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Fredoka'; ctx.textAlign='center'; ctx.textBaseline='middle';
            if (btn.icon) {
                ctx.font = '24px Arial'; ctx.fillText(btn.icon, btn.x+btn.w/2, btn.y+btn.h/2 - 10 + oy);
                ctx.font = 'bold 14px Fredoka'; ctx.fillText(btn.text, btn.x+btn.w/2, btn.y+btn.h/2 + 15 + oy);
            } else {
                ctx.fillText(btn.text, btn.x+btn.w/2, btn.y+btn.h/2 + oy);
            }
        });

        // --- FX ---
        particles.forEach(p => { ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
        ctx.globalAlpha = 1.0;
        floatingTexts.forEach(ft => { ctx.globalAlpha = Math.max(0, ft.life); ctx.fillStyle = ft.color; ctx.font = 'bold 28px Fredoka'; ctx.shadowColor = '#000'; ctx.shadowBlur = 5; ctx.textAlign='center'; ctx.fillText(ft.text, ft.x, ft.y); ctx.shadowBlur=0; });
        ctx.globalAlpha = 1.0;
        if(screenFlash > 0) { ctx.fillStyle = `rgba(255,255,255,${screenFlash})`; ctx.fillRect(0,0,GAME_W,GAME_H); }
    }

    // --- MAIN LOOP ---
    function gameLoop(time) {
        if (!game.isPlaying) return;
        requestAnimationFrame(gameLoop);
        let dt = (time - game.lastTime) / 1000;
        game.lastTime = time;
        if (dt > 0.1) dt = 0.1;
        update(dt); draw();
    }
</script>
</body>
